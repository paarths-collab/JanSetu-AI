name: Deploy (Vercel)

# Continuous deployment to Vercel on every push to main.
# Skips gracefully until the Vercel secrets are configured in the repo:
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (Settings -> Secrets and variables -> Actions)

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check for Vercel token
        id: guard
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set — skipping deploy. Add repo secrets to enable CD."
          fi

      - name: Checkout
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        if: steps.guard.outputs.enabled == 'true'
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        if: steps.guard.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.guard.outputs.enabled == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.guard.outputs.enabled == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
