name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (services)
        run: npm test

      - name: Build (Next.js)
        run: npm run build
        env:
          # Not required at build time (AI calls happen at runtime), passed for parity.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
